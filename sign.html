<!DOCTYPE html>
<html lang="en">
<head>
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


  <script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.15.0/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="sign.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sign up</title>
</head>
<body>

  <header>
<span class="logo1"> QRY</span>
<span class="logo2">PTI</span>
  </header>

    <div class="screen">
    <!-- sign up -->




    <form  class="Sign up">

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">Admin Email</label>
        <input 
          type="email" 
          id="email" 
          placeholder="admin@imanilogistics.co.uk" 
          required
        >
      </div>

      <!-- PASSWORD -->
      <div class="form-group password-group">
        <label for="password">Password</label>

        <div class="password-wrapper">
          <input 
            type="password" 
            id="password" 
            placeholder="Enter secure password"
            minlength="6"
            required
          >
          <span class="toggle-password" id="togglePassword">
            <i class="fas fa-eye"></i>
          </span>
        </div>

        <!-- Strength Meter -->
        <div class="strength-meter">
          <div id="strengthBar"></div>
        </div>
        <small id="strengthText"></small>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group password-group">
        <label for="confirmPassword">Confirm Password</label>

        <div class="password-wrapper">
          <input 
            type="password" 
            id="confirmPassword" 
            placeholder="Re-enter password"
            minlength="6"
            required
          >
          <span class="toggle-password" id="toggleConfirmPassword">
            <i class="fas fa-eye"></i>
          </span>
        </div>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn btn-primary full-width">
        Create Account
      </button>

  <div class="text">
      <p> Already have an account? <a href="login.html">Login</a></p>

  </div>
    </form>

</div>
<script type="module" src="auth.js"></script>
<script type="module" src="firebase.js"></script>
<script type="module" src="sign.js"></script>
</body>
</html>
